name: Update and Filter IPTV List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download, Merge and Filter
        run: |
          mkdir -p out
          URLS=(
            "https://ybs.yu7.cc.cd/all.m3u8"
            "https://raw.githubusercontent.com/CCSH/IPTV/main/live.m3u"
            "https://raw.githubusercontent.com/skddyj/iptv/main/IPTV.m3u"
          )
          
          OUTPUT_FILE="out/iptv.m3u8"
          TEMP_ALL="out/all_merged.m3u8"
          
          > $TEMP_ALL
          for url in "${URLS[@]}"; do
            curl -L -s "$url" >> $TEMP_ALL
          done
          
          # 格式化处理：确保符合 M3U8 标准
          # 读取临时文件，过滤关键词，并确保每个 URL 都配有 #EXTINF
          echo "#EXTM3U" > $OUTPUT_FILE
          
          awk '
            # 找到名称行，存入变量 name
            /#EXTINF/ { name = $0 } 
            # 找到 http 开头的行，并进行过滤与输出
            /^http/ { 
              # 只有当频道名符合要求时才输出 (白名单 + 黑名单过滤)
              if (name ~ /CCTV|卫视|影院|轮播/ && name !~ /市|县|区|都市|经视/) {
                print name; print $0 
              }
            }' $TEMP_ALL >> $OUTPUT_FILE
            
          rm $TEMP_ALL

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f out/iptv.m3u8
          if git diff --staged --quiet; then echo "No changes."; else git commit -m "Fixed format for PotPlayer: $(date +'%Y-%m-%d %H:%M:%S')"; git push; fi
