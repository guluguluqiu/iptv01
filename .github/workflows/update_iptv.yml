name: Update and Merge IPTV

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge and Clean
        run: |
          mkdir -p out
          # 仅保留 GitHub 上的两个源
          URLS=(
            "https://raw.githubusercontent.com/CCSH/IPTV/main/live.m3u"
            "https://raw.githubusercontent.com/skddyj/iptv/main/IPTV.m3u"
          )
          
          TEMP_ALL="out/all_merged.m3u8"
          OUTPUT_FILE="out/iptv.m3u8"
          > $TEMP_ALL
          
          for url in "${URLS[@]}"; do
            curl -L -s "$url" >> $TEMP_ALL
          done
          
          # 格式清理：
          # 1. 确保以 #EXTM3U 开头
          # 2. 将所有符合 M3U8 标准的行提取出来，剔除空行和无效字符
          echo "#EXTM3U" > $OUTPUT_FILE
          awk '/^#EXTINF/ {name=$0} /^https?:\/\// {print name; print $0}' $TEMP_ALL >> $OUTPUT_FILE
          
          rm $TEMP_ALL

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f out/iptv.m3u8
          if git diff --staged --quiet; then echo "No changes."; else git commit -m "Merged clean IPTV: $(date +'%Y-%m-%d %H:%M:%S')"; git push; fi
