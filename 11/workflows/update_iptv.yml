name: Update, Filter and Merge IPTV

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download, Merge and Filter
        run: |
          mkdir -p out
          URLS=(
            "https://ybs.yu7.cc.cd/all.m3u8"
            "https://raw.githubusercontent.com/CCSH/IPTV/main/live.m3u"
            "https://raw.githubusercontent.com/skddyj/iptv/main/IPTV.m3u"
          )
          
          TEMP_ALL="out/all_merged.m3u8"
          OUTPUT_FILE="out/iptv.m3u8"
          
          > $TEMP_ALL
          for url in "${URLS[@]}"; do
            curl -L -s "$url" >> $TEMP_ALL
          done
          
          # 1. 过滤：保留 CCTV, 卫视等，剔除地方台/市级关键词
          # 2. 排序与去重：确保每个频道名称唯一
          # 3. 整理：使用 awk 重新组织格式
          echo "#EXTM3U" > $OUTPUT_FILE
          
          # 使用 awk 处理：将名称和链接存入临时数组，名称相同则追加地址
          awk -F'[,]' '
            /#EXTINF/ {name=$2; getline; url=$1; 
              if (name ~ /CCTV|卫视|影院|轮播/ && name !~ /市|县|区|都市|经视/) {
                if (list[name] == "") { list[name]=url; names[++count]=name }
                else { list[name]=list[name] "\n" url }
              }
            }
            END {
              for (i=1; i<=count; i++) {
                print "#EXTINF:-1," names[i]; print list[names[i]]
              }
            }' $TEMP_ALL >> $OUTPUT_FILE
          
          rm $TEMP_ALL

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f out/iptv.m3u8
          if git diff --staged --quiet; then echo "No changes."; else git commit -m "Merged and Optimized IPTV"; git push; fi